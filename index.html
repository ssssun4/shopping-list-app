<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    #item-input {
      flex: 1;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #item-input:focus { border-color: #4f8ef7; }

    #qty-input {
      width: 64px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 10px 8px;
      font-size: 0.95rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    #qty-input:focus { border-color: #4f8ef7; }

    #add-btn {
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #add-btn:hover { background: #2f6fe0; }

    .hint { font-size: 0.78rem; color: #bbb; margin-bottom: 20px; }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .count { font-size: 0.85rem; color: #666; }

    #clear-checked {
      background: none;
      border: none;
      font-size: 0.82rem;
      color: #f06565;
      cursor: pointer;
      padding: 4px 0;
    }

    #clear-checked:hover { text-decoration: underline; }

    #item-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f8f9ff;
      border: 1.5px solid #e8ecff;
      border-radius: 10px;
      padding: 10px 12px;
      transition: background 0.15s, opacity 0.15s;
      animation: slideIn 0.18s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item.checked {
      background: #f2f2f2;
      border-color: #e0e0e0;
      opacity: 0.65;
    }

    .item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f8ef7;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-name {
      flex: 1;
      font-size: 0.95rem;
      color: #333;
      word-break: break-all;
    }

    .item.checked .item-name {
      text-decoration: line-through;
      color: #aaa;
    }

    .item-qty {
      font-size: 0.82rem;
      color: #888;
      background: #e8ecff;
      border-radius: 6px;
      padding: 2px 7px;
      flex-shrink: 0;
    }

    .item.checked .item-qty { background: #e8e8e8; }

    .del-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .del-btn:hover { color: #f06565; }

    .empty {
      text-align: center;
      color: #bbb;
      font-size: 0.9rem;
      padding: 32px 0;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🛒 쇼핑 리스트</h1>
  <p class="subtitle">오늘 사야 할 것들을 기록해 보세요</p>

  <div class="input-row">
    <input id="item-input" type="text" placeholder="아이템 이름" maxlength="60" />
    <input id="qty-input" type="text" placeholder="수량" maxlength="10" />
    <button id="add-btn">추가</button>
  </div>
  <p class="hint">Enter 키를 눌러도 추가됩니다</p>

  <div class="toolbar">
    <span class="count" id="count-label"></span>
    <button id="clear-checked">완료 항목 삭제</button>
  </div>

  <ul id="item-list"></ul>
</div>

<script>
  const STORAGE_KEY = 'vibecoding-shopping-list';

  let items = load();

  function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  function render() {
    const list = document.getElementById('item-list');
    const label = document.getElementById('count-label');
    const total = items.length;
    const done = items.filter(i => i.checked).length;

    label.textContent = total === 0 ? '' : `전체 ${total}개 · 완료 ${done}개`;

    if (total === 0) {
      list.innerHTML = '<li class="empty">아직 아이템이 없습니다</li>';
      return;
    }

    list.innerHTML = items.map((item, idx) => `
      <li class="item ${item.checked ? 'checked' : ''}" data-idx="${idx}">
        <input type="checkbox" ${item.checked ? 'checked' : ''} data-action="check" />
        <span class="item-name">${escHtml(item.name)}</span>
        ${item.qty ? `<span class="item-qty">${escHtml(item.qty)}</span>` : ''}
        <button class="del-btn" data-action="del" title="삭제">✕</button>
      </li>
    `).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function addItem() {
    const nameEl = document.getElementById('item-input');
    const qtyEl = document.getElementById('qty-input');
    const name = nameEl.value.trim();
    if (!name) { nameEl.focus(); return; }
    items.unshift({ name, qty: qtyEl.value.trim(), checked: false });
    save();
    render();
    nameEl.value = '';
    qtyEl.value = '';
    nameEl.focus();
  }

  document.getElementById('add-btn').addEventListener('click', addItem);

  document.getElementById('item-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });

  document.getElementById('qty-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });

  document.getElementById('clear-checked').addEventListener('click', () => {
    items = items.filter(i => !i.checked);
    save();
    render();
  });

  document.getElementById('item-list').addEventListener('click', e => {
    const li = e.target.closest('[data-idx]');
    if (!li) return;
    const idx = parseInt(li.dataset.idx);
    const action = e.target.dataset.action;
    if (action === 'check') {
      items[idx].checked = e.target.checked;
      save();
      render();
    } else if (action === 'del') {
      items.splice(idx, 1);
      save();
      render();
    }
  });

  render();
</script>
</body>
</html>
